<script language="JavaScript" src="/scripts/MD5.js"></script>

<script language="JavaScript">
	let keys = {t:false, r:false};

	document.addEventListener("keydown", event => 
	{
		if(event.key =="t")
		{
			keys.t = true;
		}

		if(event.key =="r")
		{
			keys.r = true;
		}
		if(keys.t && keys.r)
		{
		document.getElementById("loginLayer").style.display = "block";
		}
		
	});
	document.addEventListener("keyup", event => 
	{
		if(event.key =="t")
		{
			keys.t = false;
		}
		if(event.key =="r")
		{
			keys.r = false;
		}
	});

	document.addEventListener("keydown", event => 
	{
		if(event.key =="Escape")
		{
		document.getElementById("loginLayer").style.display = "none";
		}
	});	

	function hashing()
	{
		document.form.password.value = hex_md5(document.form.password.value);
	}

	function formCheck()
	{
		if(document.form.employeecode.value=="")
		{
				   alert("You must give an employee code!");
				return false;
		}
		if(document.form.password.value=="")
		{
				   alert("You must give a password!");
				return false;
		}
	}
</script>
