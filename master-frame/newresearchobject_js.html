<script language="JavaScript">
function formCheckNewResearchObject()
{
    if(document.newresearchobjectform.fobjectNumber.value=="")
    {
        alert("You must give an Object Number!");
        return false;
    }
    if(document.newresearchobjectform.fobjectName.value=="")
    {
        alert("You must give an Object Name!");
        return false;
    }
    if(document.newresearchobjectform.fobjectText.value=="")
    {
        alert("You must give an Object Text!");
        return false;
    }
}
</script>
